<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gpiplay Holoprint</title>

<style>
:root{
--bg:#ffffff;
--card:#f4f4f4;
--text:#111;
--accent:#00bcd4;
}

body.dark{
--bg:#000000;
--card:#0a0a0a;
--text:#ffffff;
}

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
transition:.3s;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:var(--card);
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.left{
display:flex;
gap:15px;
align-items:center;
}

.right{
display:flex;
gap:10px;
align-items:center;
}

.logo{
height:35px;
}

.skin{
height:35px;
border-radius:6px;
}

.btn{
padding:8px 14px;
border:none;
background:var(--accent);
color:white;
border-radius:6px;
cursor:pointer;
}

.nav{
display:flex;
gap:15px;
padding:10px 20px;
}

.nav button{
background:none;
border:none;
font-size:16px;
cursor:pointer;
color:var(--text);
}

/* SEARCH */

.search{
padding:15px;
display:flex;
gap:10px;
}

.search input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
padding:20px;
}

/* CARD */

.card{
background:var(--card);
border-radius:10px;
overflow:hidden;
transition:.3s;
animation:fade .5s ease;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.badge{
padding:3px 8px;
border-radius:4px;
font-size:12px;
}

.free{background:#2ecc71;color:white;}
.premium{background:#e74c3c;color:white;}

.lock{
opacity:.5;
pointer-events:none;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* MEMBERSHIP */

.membership{
padding:20px;
}

.pay-box{
background:var(--card);
padding:15px;
border-radius:10px;
margin-top:15px;
}

/* FOOTER */

footer{
padding:20px;
text-align:center;
background:var(--card);
margin-top:40px;
}
</style>
</head>

<body>

<header>

<div class="left">
<a href="https://t.me/gpiplayholoprint">@gpiplayholoprint</a>
</div>

<div class="right">
<img src="skin.png" class="skin">
<img src="logo.png" class="logo">
<button class="btn" onclick="window.open('https://t.me/ivan_not_here')">+</button>
<button class="btn" onclick="toggleTheme()">🌙</button>
<select onchange="setLang(this.value)">
<option value="en">EN</option>
<option value="mm">MM</option>
<option value="ar">AR</option>
<option value="ru">RU</option>
</select>
</div>

</header>

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('premium')">Premium</button>
<button onclick="showPage('free')">Free Builds</button>
<button onclick="showPage('membership')">Membership</button>
<button onclick="showPage('about')">About</button>
</div>

<div class="search">
<input placeholder="Search..." oninput="search(this.value)">
</div>

<div id="content"></div>

<footer>
Gpiplay Holoprint — Minecraft Holoprint Library  
<br>
Telegram: @gpiplayholoprint
</footer>

<script>

/* LANGUAGE */

let lang="en"

const text={
en:{
buy:"Buy Membership",
paid:"I Paid",
premium:"Premium",
free:"Free"
},
mm:{
buy:"အဖွဲ့ဝင် ဝယ်ယူရန်",
paid:"ငွေပေးပြီး",
premium:"ပရီမီယံ",
free:"အခမဲ့"
},
ar:{
buy:"شراء العضوية",
paid:"دفعت",
premium:"بريميوم",
free:"مجاني"
},
ru:{
buy:"Купить доступ",
paid:"Я оплатил",
premium:"Премиум",
free:"Бесплатно"
}
}

function setLang(l){
lang=l
render()
}

/* THEME */

function toggleTheme(){
document.body.classList.toggle("dark")
}

/* MEMBERSHIP */

let member=false

function paid(){
member=true
alert("Membership Activated")
render()
}

/* DATA */

let builds=[
{
title:"GreenRoof House",
desc:"Cool simple survival house",
img scr="greenhouse.jpg",
link:"#",
type:"free"
},
{
title:"Mega Castle",
desc:"Huge castle build",
img:"https://i.imgur.com/2.jpg",
link:"#",
type:"premium"
}
]

/* RENDER */

function render(){

let html=""

if(page=="home"){
html+=grid(builds)
}

if(page=="free"){
html+=grid(builds.filter(b=>b.type=="free"))
}

if(page=="premium"){
html+=grid(builds.filter(b=>b.type=="premium"))
}

if(page=="membership"){
html=`
<div class="membership">

<h2>Diamond Rank</h2>
<p>5 TON or 25000 MMK</p>

<div class="pay-box">

TON Wallet:
<br>
<code>EQXXXXXXXXXXXX</code>
<br><br>

Wave Pay / KPay:
<br>
25000 MMK

<br><br>

<button class="btn" onclick="paid()">
${text[lang].paid}
</button>

</div>
</div>
`
}

if(page=="about"){
html=`<div style="padding:20px">
Gpiplay Holoprint Library  
Download Minecraft Bedrock Holoprints  
Free & Premium builds
</div>`
}

content.innerHTML=html
}

/* GRID */

function grid(list){
return `
<div class="grid">
${list.map(card).join("")}
</div>
`
}

function card(b){

let locked=b.type=="premium" && !member

return `
<div class="card ${locked?"lock":""}">

<img src="${b.img}">

<div class="card-body">

<h3>${b.title}</h3>
<p>${b.desc}</p>

<span class="badge ${b.type}">
${text[lang][b.type]}
</span>

<br><br>

${locked ?
`<button class="btn" onclick="showPage('membership')">🔒</button>`
:
`<a href="${b.link}">
<button class="btn">Download</button>
</a>`
}

</div>
</div>
`
}

/* NAV */

let page="home"

function showPage(p){
page=p
render()
}

/* SEARCH */

function search(q){
q=q.toLowerCase()
renderCustom(
builds.filter(b=>b.title.toLowerCase().includes(q))
)
}

function renderCustom(list){
content.innerHTML=grid(list)
}

/* ADMIN ADD */

function addBuild(title,desc,img,link,type){
builds.unshift({title,desc,img,link,type})
render()
}

render()

</script>

</body>
</html>
