<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holoprint Hub</title><style>
:root{
--bg:#ffffff;
--card:#f5f5f5;
--text:#111;
}

body.dark{
--bg:#0b0b0b;
--card:#111;
--text:#fff;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
transition:.25s;
}

nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
background:var(--card);
border-bottom:1px solid rgba(0,0,0,.1);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:20px;
cursor:pointer;
}

.logo img{
width:40px;
height:40px;
}

.menu button{
background:none;
border:none;
color:var(--text);
margin-left:15px;
font-size:15px;
cursor:pointer;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.hero{
display:flex;
align-items:center;
gap:20px;
background:var(--card);
padding:20px;
border-radius:14px;
}

.hero img{
width:120px;
}

.search{
margin:20px 0;
display:flex;
gap:10px;
}

.search input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.card{
background:var(--card);
border-radius:12px;
overflow:hidden;
border:1px solid rgba(0,0,0,.08);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.btn{
display:block;
background:#22c55e;
padding:8px;
border-radius:8px;
text-align:center;
text-decoration:none;
color:white;
margin-top:6px;
}

.admin input{
display:block;
margin-bottom:10px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
width:100%;
}

.admin button{
padding:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.about-box{
background:var(--card);
padding:20px;
border-radius:12px;
}

.toggle{
background:#111;
color:white;
padding:6px 10px;
border-radius:8px;
font-size:12px;
}

body.dark .toggle{
background:white;
color:black;
}
</style></head><body><nav>
<div class="logo" onclick="toggleDark()">
<img src="logo.png">
Holoprint Hub
<span class="toggle">Night</span>
</div><div class="menu">
<button onclick="show('home')">Home</button>
<button onclick="show('about')">About</button>
<button onclick="show('admin')">Admin</button>
</div>
</nav><!-- HOME --><div id="home" class="page active"><div class="hero">
<img src="skin.png">
<div>
<h2>Holoprint Library</h2>
<p>Download Minecraft Holoprint builds instantly</p>
</div>
</div><div class="search">
<input placeholder="Search holoprint..." id="search" oninput="render()">
</div><div class="grid" id="grid"></div>
</div><!-- ABOUT --><div id="about" class="page">
<div class="about-box">
<h2>About</h2>
<p>This website provides Minecraft Holoprint builds. You can download .mcpack files instantly.</p>
</div>
</div><!-- ADMIN --><div id="admin" class="page">
<div class="admin">
<h2>Admin Upload</h2>
<input id="title" placeholder="Build name">
<input id="desc" placeholder="Description">
<input type="file" id="image">
<input type="file" id="file">
<button onclick="upload()">Post Holoprint</button>
</div>
</div><script>
let builds = JSON.parse(localStorage.getItem("holoprints") || "[]");

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")==="true"){
document.body.classList.add("dark");
}

function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

function save(){
localStorage.setItem("holoprints", JSON.stringify(builds));
}

function render(){
const grid = document.getElementById("grid");
const q = document.getElementById("search").value.toLowerCase();

grid.innerHTML="";

builds
.filter(b=>b.title.toLowerCase().includes(q))
.forEach(b=>{

grid.innerHTML += `
<div class="card">
<img src="${b.image}">
<div class="card-body">
<b>${b.title}</b>
<div style="opacity:.7;font-size:13px">${b.desc}</div>
<a class="btn" href="${b.file}" download="holoprint.mcpack">Download</a>
</div>
</div>
`;
});
}

function upload(){
const title = document.getElementById("title").value;
const desc = document.getElementById("desc").value;
const image = document.getElementById("image").files[0];
const file = document.getElementById("file").files[0];

if(!title||!image||!file) return alert("fill all");

const r1 = new FileReader();
const r2 = new FileReader();

r1.onload=e=>{
r2.onload=f=>{

builds.unshift({
title,
desc,
image:e.target.result,
file:f.target.result
});

save();
render();
show('home');
}

r2.readAsDataURL(file);
}

r1.readAsDataURL(image);
}

render();
</script></body>
  </html>
